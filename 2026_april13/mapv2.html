<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lawrence & Laramie</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f0f0f;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    header {
      padding: 14px 24px;
      background: #0f0f0f;
      display: flex;
      align-items: baseline;
      gap: 12px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 400;
      color: #e8e0d0;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    header span {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.08em;
    }

    /* Sparkle border wrapper */
    #map-wrapper {
      flex: 1;
      position: relative;
      padding: 18px;
      background: #0f0f0f;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      border-radius: 2px;
      position: relative;
      z-index: 1;
    }

    /* The animated sparkle border canvas sits on top of the padding area */
    #sparkle-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* Custom popup styling */
    .leaflet-popup-content-wrapper {
      background: #0f0f0f;
      border: 1px solid #3a3a3a;
      border-radius: 2px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      color: #e8e0d0;
    }

    .leaflet-popup-tip {
      background: #0f0f0f;
    }

    .leaflet-popup-content {
      margin: 14px 18px;
    }

    .popup-city {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #c8b89a;
      margin-bottom: 4px;
    }

    .popup-state {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: #555;
      text-transform: uppercase;
    }

    .popup-here {
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: #ffe97a;
      font-style: italic;
    }

    .leaflet-popup-close-button {
      color: #555 !important;
    }

    .leaflet-popup-close-button:hover {
      color: #c8b89a !important;
    }
  </style>
</head>
<body>

  <header>
    <h1>Two Points</h1>
    <span>Lawrence, KS &nbsp;·&nbsp; Laramie, WY</span>
  </header>

  <div id="map-wrapper">
    <div id="map"></div>
    <canvas id="sparkle-canvas"></canvas>
  </div>

  <script>
    // ── Leaflet map ──────────────────────────────────────────────
    const map = L.map('map', {
      center: [38.9717, -95.2353],
      zoom: 6,
      zoomControl: true,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    function makeIcon(color) {
      return L.divIcon({
        className: '',
        html: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="28" viewBox="0 0 20 28">
          <circle cx="10" cy="10" r="7" fill="${color}" opacity="0.9"/>
          <line x1="10" y1="17" x2="10" y2="27" stroke="${color}" stroke-width="1.5" opacity="0.6"/>
        </svg>`,
        iconSize: [20, 28],
        iconAnchor: [10, 27],
        popupAnchor: [0, -28]
      });
    }

    const lawrencePopup = `
      <div class="popup-here">&#10022; You are here</div>
      <div class="popup-state" style="margin-top:5px;">Lawrence, Kansas &nbsp;&middot;&nbsp; 38.97&deg;N 95.24&deg;W</div>
    `;

    const laramiePopup = `
      <div class="popup-city">Laramie</div>
      <div class="popup-state">Wyoming, USA &nbsp;&middot;&nbsp; 41.31&deg;N 105.59&deg;W</div>
    `;

    L.marker([38.9717, -95.2353], { icon: makeIcon('#c8b89a') })
      .addTo(map)
      .bindPopup(lawrencePopup);

    L.marker([41.3114, -105.5911], { icon: makeIcon('#8ab4c8') })
      .addTo(map)
      .bindPopup(laramiePopup);


    // ── Sparkle border ───────────────────────────────────────────
    const canvas = document.getElementById('sparkle-canvas');
    const ctx = canvas.getContext('2d');
    const PAD = 18;

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = [
      '#ffe97a','#ffd700','#ffffff','#c8b89a',
      '#aad4ff','#ffb3de','#b3ffe4','#ffddaa'
    ];

    const NUM_SPARKLES = 130;
    const sparkles = [];

    function borderPosition(t, W, H, pad) {
      const cx = pad / 2, cy = pad / 2;
      const w = W - pad, h = H - pad;
      const perimeter = 2 * (w + h);
      const dist = t * perimeter;
      if (dist < w)        return { x: cx + dist,              y: cy };
      if (dist < w + h)    return { x: cx + w,                  y: cy + dist - w };
      if (dist < 2*w + h)  return { x: cx + w - (dist - w - h), y: cy + h };
                           return { x: cx,                       y: cy + h - (dist - 2*w - h) };
    }

    for (let i = 0; i < NUM_SPARKLES; i++) {
      sparkles.push({
        t:       Math.random(),
        offset:  (Math.random() - 0.5) * (PAD * 0.75),
        size:    0.8 + Math.random() * 2.8,
        color:   COLORS[Math.floor(Math.random() * COLORS.length)],
        speed:   0.00025 + Math.random() * 0.0006,
        phase:   Math.random() * Math.PI * 2,
        twinkle: 1.2 + Math.random() * 3.5,
        type:    Math.random() < 0.28 ? 'star' : 'dot',
      });
    }

    function drawStar(x, y, r, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = 0.9;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      for (let a = 0; a < 4; a++) {
        const angle = (a / 4) * Math.PI;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(angle) * r * 2, y + Math.sin(angle) * r * 2);
        ctx.lineTo(x - Math.cos(angle) * r * 2, y - Math.sin(angle) * r * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawGlowDot(x, y, r, color, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha * 0.3;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r * 3.5);
      grad.addColorStop(0, color);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, r * 3.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = alpha;
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    let lastTime = 0;
    function animate(ts) {
      const dt = ts - lastTime;
      lastTime = ts;
      const W = canvas.width, H = canvas.height;

      ctx.clearRect(0, 0, W, H);

      // Subtle glowing border line
      ctx.save();
      ctx.strokeStyle = 'rgba(200,184,154,0.15)';
      ctx.lineWidth = 1;
      ctx.shadowColor = '#c8b89a';
      ctx.shadowBlur = 14;
      ctx.strokeRect(PAD / 2, PAD / 2, W - PAD, H - PAD);
      ctx.restore();

      const now = ts / 1000;

      for (const sp of sparkles) {
        sp.t = (sp.t + sp.speed) % 1;

        const base = borderPosition(sp.t, W, H, PAD);
        const t2   = (sp.t + 0.001) % 1;
        const b2   = borderPosition(t2, W, H, PAD);
        const tx   = b2.x - base.x, ty = b2.y - base.y;
        const len  = Math.sqrt(tx*tx + ty*ty) || 1;
        const nx   = -ty / len, ny = tx / len;

        const x = base.x + nx * sp.offset;
        const y = base.y + ny * sp.offset;

        const alpha = 0.3 + 0.7 * Math.abs(Math.sin(now * sp.twinkle + sp.phase));

        if (sp.type === 'star') {
          drawStar(x, y, sp.size * 0.9, sp.color, alpha);
        } else {
          drawGlowDot(x, y, sp.size, sp.color, alpha);
        }
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>

</body>
</html>
